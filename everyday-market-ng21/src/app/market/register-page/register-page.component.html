<div class="register-container">
  <h2>Customer Registration</h2>

  <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">

    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" formControlName="name" [class.error-border]="isInvalid('name')" title="Full Name" placeholder="Enter your full name">
      <div class="error" *ngIf="isInvalid('name')">Name must be at least 5 characters, letters and spaces only</div>
    </div>

    <div class="form-group">
      <label>Email *</label>
      <input type="email" formControlName="email" [class.error-border]="isInvalid('email')" title="Email Address" placeholder="your@email.com">
      <div class="error" *ngIf="isInvalid('email')">Valid email required</div>
    </div>

    <div class="form-group">
      <label>Phone (10 digits) *</label>
      <input type="tel" formControlName="phone" [class.error-border]="isInvalid('phone')" title="Phone Number" placeholder="1234567890">
      <div class="error" *ngIf="isInvalid('phone')">Enter exactly 10 digits</div>
    </div>

    <div class="form-group">
      <label>Date of Birth *</label>
      <input type="date" formControlName="dob" [class.error-border]="isInvalid('dob')" title="Date of Birth">
    </div>

    <div class="form-group">
      <label>Street Address *</label>
      <input type="text" formControlName="streetAddress" [class.error-border]="isInvalid('streetAddress')" title="Street Address" placeholder="123 Main St">
      <div class="error" *ngIf="isInvalid('streetAddress')">Letters, numbers, spaces only</div>
    </div>

    <div class="form-group">
      <label>Province *</label>
      <select formControlName="province" [class.error-border]="isInvalid('province')" title="Province">
        <option value="">Select a province</option>
        <option *ngFor="let p of provinces" [value]="p">{{p}}</option>
      </select>
    </div>

    <div class="form-group">
      <label>Country *</label>
      <select formControlName="country" [class.error-border]="registrationForm.hasError('mustBeCanada') && registrationForm.get('country')?.touched" title="Country">
        <option value="">Select a country</option>
        <option *ngFor="let c of countries" [value]="c">{{c}}</option>
      </select>
      <div class="error" *ngIf="registrationForm.hasError('mustBeCanada') && registrationForm.get('country')?.touched">
        Must select Canada
      </div>
    </div>

    <div class="form-group checkbox">
      <label>
        <input type="checkbox" formControlName="terms"> I accept Terms & Conditions *
      </label>
    </div>

    <button type="submit" [disabled]="!registrationForm.valid">Register</button>
  </form>
</div>
